# Production: Nginx on port 80 → Gunicorn on 127.0.0.1:5000 only.
# Do NOT expose Gunicorn to the internet — security group should allow TCP 80 (and 22), not 5000.
#
# Install:
#   sudo cp nginx-flaskapp-http80.conf /etc/nginx/sites-available/flaskapp
#   sudo ln -sf /etc/nginx/sites-available/flaskapp /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # optional: remove default site
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
